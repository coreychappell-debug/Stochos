<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Marketing Contract & Fiscal Year Planning Tool</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <style>
        :root {
            --bg-main: #111827; --bg-panel: #1f2937; --bg-input: #374151; --border-color: #4b5563;
            --text-light: #d1d5db; --text-dark: #9ca3af; --accent-color: #3b82f6; --danger-color: #ef4444;
        }
        html, body { height: 100%; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-light); }
        
        #app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 12px;
            gap: 12px;
            box-sizing: border-box;
        }

        #top-bar {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            background-color: #1f2937; /* bg-panel */
            border-radius: 0.5rem;
        }
        .header-title { font-size: 1.25rem; font-weight: 600; }
        .header-controls { display: flex; align-items: center; gap: 1rem; }
        .control-group { display: flex; align-items: center; gap: 0.5rem; }

        #main-content {
            flex-grow: 1;
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            gap: 12px;
            overflow: hidden;
        }

        #footer {
            flex-shrink: 0;
            background-color: var(--bg-panel);
            border-radius: 8px;
            padding: 12px;
            overflow-y: auto;
            max-height: 150px;
        }

        .panel { background-color: var(--bg-panel); border-radius: 8px; padding: 16px; overflow-y: auto; }
        #left-panel, #right-panel { display: flex; flex-direction: column; gap: 16px; }
        
        h2, h3, h4 { font-weight: 600; }
        h3 { border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-bottom: 8px; }
        
        button, select { background-color: var(--bg-input); border: 1px solid var(--border-color); border-radius: 6px; padding: 6px 10px; cursor: pointer; transition: background-color 0.2s; color: var(--text-light); }
        button:hover:not(:disabled) { background-color: #4b5563; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        input[type="text"], input[type="number"], input[type="date"] { background-color: var(--bg-input); border: 1px solid var(--border-color); border-radius: 6px; padding: 6px 10px; width: auto; color: var(--text-light); }
        
        .denom-item { display: grid; grid-template-columns: auto auto 1fr auto; align-items: center; gap: 8px; margin-bottom: 12px; }
        .denom-details { grid-column: 1 / -1; margin-top: 4px; }
        #denom-total.total-error { color: var(--danger-color); font-weight: bold; }
        
        .game-group { margin-bottom: 20px; border: 1px solid var(--border-color); border-radius: 8px; }
        .game-group-header { display: flex; align-items: center; gap: 12px; padding: 10px; background-color: #2b3649; border-radius: 8px 8px 0 0; cursor: pointer; }
        
        .game-table { width: 100%; border-collapse: collapse; }
        .game-table th, .game-table td { padding: 8px; text-align: left; border-bottom: 1px solid var(--border-color); font-size: 0.9em; }
        .game-table th { font-weight: 600; color: var(--text-dark); }
        .game-table input, .game-table select { max-width: 150px; width: 100%; box-sizing: border-box; }
        
        .modal-overlay { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); justify-content: center; align-items: center; }
        .modal-content { background-color: var(--bg-panel); padding: 24px; border-radius: 8px; min-width: 400px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        
        .tab-btn.active { background-color: var(--accent-color); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .dropdown { position: relative; display: inline-block; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: #374151; min-width: 220px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); z-index: 1; border-radius: 6px; }
        .dropdown-content a { color: var(--text-light); padding: 12px 16px; text-decoration: none; display: block; }
        .dropdown-content a:hover { background-color: #4b5563; }
        .dropdown:hover .dropdown-content { display: block; }
    </style>
</head>
<body>
    <div id="app-container">
        <header id="top-bar" role="banner" aria-label="Fiscal Year Controls">
            <div class="header-title">Fiscal Year Planner</div>
            <div class="header-controls" role="group" aria-label="Primary Controls">
                <button id="undo-btn" aria-label="Undo last action" disabled>Undo</button>
                <button id="redo-btn" aria-label="Redo last action" disabled>Redo</button>
                <div class="control-group">
                    <label for="fiscal-year">Fiscal Year:</label>
                    <input type="number" id="fiscal-year" size="4" inputmode="numeric" />
                </div>
                <div class="control-group">
                    <label for="total-sales-target">Total Sales Target: $</label>
                    <input type="text" id="total-sales-target" placeholder="e.g., 4,800,000,000" inputmode="numeric" />
                </div>
                <div class="control-group">
                    <label for="vendor-filter">View:</label>
                    <select id="vendor-filter" aria-label="Filter plan by vendor">
                        <option value="all">All Vendors</option>
                        <option value="sg">Scientific Games</option>
                        <option value="pb">Pollard Banknote</option>
                        <option value="bs">Brightstar</option>
                    </select>
                </div>
                <input type="file" id="load-plan-input" style="display:none" accept=".json" />
                <button id="load-plan-btn">Load Plan</button>
                <button id="save-plan-btn">Save Plan</button>
                <div class="dropdown" role="navigation" aria-label="Export">
                    <button class="dropdown-btn" aria-haspopup="true" aria-expanded="false">Export</button>
                    <div class="dropdown-content" role="menu" aria-label="Export options">
                        <a href="#" id="export-summary-csv" role="menuitem">Executive Summary (CSV)</a>
                        <a href="#" id="export-summary-xlsx" role="menuitem">Executive Summary (XLSX)</a>
                        <a href="#" id="export-detail-csv" role="menuitem">Detailed Build (CSV)</a>
                        <a href="#" id="export-detail-xlsx" role="menuitem">Detailed Build (XLSX)</a>
                    </div>
                </div>
            </div>
        </header>

        <main id="main-content" role="main">
            <aside id="left-panel" class="panel" aria-label="Denominations"></aside>
            <section id="center-panel" class="panel" aria-label="Fiscal Year Plan"></section>
            <aside id="right-panel" class="panel" aria-label="Vendor Pricing"></aside>
        </main>

        <footer id="footer" class="panel" aria-live="polite" aria-label="Audit Trail"></footer>
    </div>

    <!-- Modals -->
    <div id="feature-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-game-name">
        <div class="modal-content">
            <h3>Edit Features for <span id="modal-game-name"></span></h3>
            <div id="feature-checklist"></div>
            <div class="modal-actions">
                <button id="modal-save-btn">Save</button>
                <button id="modal-cancel-btn">Cancel</button>
            </div>
        </div>
    </div>

    <div id="feature-management-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-label="Manage Special Features">
        <div class="modal-content">
            <h3>Manage Special Features</h3>
            <div id="feature-management-list"></div>
            <div class="add-feature-form">
                <h4>Add New Feature</h4>
                <input type="text" id="new-feature-name" placeholder="New feature name" />
                <button id="add-feature-btn">Add</button>
            </div>
            <div class="modal-actions">
                <button id="modal-done-btn">Done</button>
            </div>
        </div>
    </div>

    <div id="confirm-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="confirm-title">Confirmation</h3>
            <p id="confirm-message" class="my-4"></p>
            <div class="modal-actions">
                <button id="confirm-cancel-btn">Cancel</button>
                <button id="confirm-ok-btn" style="background-color: var(--danger-color);">OK</button>
            </div>
        </div>
    </div>

    <script>
    (function () {
        'use strict';

        // --- CONSTANTS & STATE ---
        const FEATURES_CSV_DATA = `"Generic Feature","SG Brand Name","PB Brand Name","BS Brand Name","SG (Y/N)","PB (Y/N)","BS (Y/N)"
"Holographic Foil","HoloFoil™","Scratch FX® Holographic","Holographic Substrate","Y","Y","Y"
"Sparkle/Glitter Coating","Glitter Ink","Sparkle®","Metallic Sparkle","Y","Y","N"
"Scented Ink","Scent™","Scratch & Sniff®","Aroma Ink","Y","Y","Y"
"Metallic Ink","Metallic Inks","Metallic Inks","Metallic FX","Y","Y","Y"
"Die-Cut Ticket","Custom Die-Cut","Die-Cut","Custom Shape","Y","Y","Y"
"Oversized Format","Jumbo Ticket","Big Ticket™","Oversized Format","Y","Y","Y"
"Extended Play (Crossword/Bingo)","Extended Play","Crossword/Bingo","Extended Play","Y","Y","Y"
"Licensed Property Usage","Licensed Brands","Licensed Portfolio","","Y","Y","N"
"Recycled Substrate","Eco-Stock","Recycled Content Paper","","Y","Y","N"
"Secure Barcoding","Secure Code™","SecureValidate™","Secure Barcode","Y","Y","Y"`;

        const CONTRACT_UNIT_PRESETS = {
            1: [12000000, 18000000, 24000000], 2: [12000000, 18000000, 24000000],
            3: [12000000, 18000000, 24000000], 5: [12000000, 18000000, 24000000],
            10: [12000000, 18000000], 20: [12000000], 30: [12000000], default: [10000000]
        };

        let state = {};
        const initialState = {
            fiscalYear: new Date().getFullYear() + 1,
            totalSalesTarget: 5_000_000_000,
            denominations: [
                { price: 1, mixPercent: 10, isActive: true,  isCollapsed: false }, { price: 2, mixPercent: 15, isActive: true,  isCollapsed: false },
                { price: 3, mixPercent: 10, isActive: true,  isCollapsed: false }, { price: 5, mixPercent: 25, isActive: true,  isCollapsed: false },
                { price:10, mixPercent: 20, isActive: true,  isCollapsed: false }, { price:20, mixPercent: 15, isActive: true,  isCollapsed: false },
                { price:25, mixPercent:  0, isActive: true,  isCollapsed: false }, { price:30, mixPercent:  5, isActive: true,  isCollapsed: false },
                { price:50, mixPercent:  0, isActive: false, isCollapsed: false }
            ],
            games: [
                { id:'g1', gameNumber:'1234', denominationPrice:5,  name:'Lucky 7s #123',     vendorId:'sg', units:12000000, payoutPercent:68.5, featureIds:[], poNumber:'', poDate:'', receiptDate:'', deliveryStatus:'Planned' },
                { id:'g2', gameNumber:'5678', denominationPrice:10, name:'Ultimate Cash #234', vendorId:'pb', units:18000000, payoutPercent:71.0, featureIds:["Holographic Foil"], poNumber:'', poDate:'', receiptDate:'', deliveryStatus:'Planned' }
            ],
            vendorPricing: {
                sg: { costModel:'percentOfSales', baseCostValue:1.5,  features:{} }, pb: { costModel:'perThousand',    baseCostValue:21.8, features:{} },
                bs: { costModel:'perThousand',    baseCostValue:23.1, features:{} }
            },
            featureMasterList: [], auditLog: [],
            ui: { activeVendorTab:'sg', editingFeaturesForGameId:null, vendorFilter:'all' }
        };

        let history = [];
        let historyIndex = -1;
        let db;
        const DB_NAME = 'PlanDB';
        const STORE_NAME = 'PlanStore';

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', boot);

        async function boot() {
            try {
                await openDBSafe();
                const restored = await restoreFromAutosaveSafe();
                if (!restored) {
                    setState(JSON.parse(JSON.stringify(initialState)));
                }
            } catch (e) {
                console.warn('[init] Non-fatal init error:', e);
                setState(JSON.parse(JSON.stringify(initialState)));
            }
            
            try {
                setupEventListeners();
                initializeVendorPricing();
                loadFeatures();
                recordHistory(true);
                render();
            } catch (e) {
                console.error('[render] Failed to render:', e);
                byId('center-panel').innerHTML = `<div class="p-3 text-red-400">Startup error — open the console for details.</div>`;
            }
        }

        // --- EVENTS ---
        function setupEventListeners() {
            byId('undo-btn').addEventListener('click', undo);
            byId('redo-btn').addEventListener('click', redo);
            byId('fiscal-year').addEventListener('change', handleGlobalChange);
            byId('total-sales-target').addEventListener('change', handleGlobalChange);
            byId('vendor-filter').addEventListener('change', handleGlobalChange);
            byId('load-plan-btn').addEventListener('click', () => byId('load-plan-input').click());
            byId('load-plan-input').addEventListener('change', loadPlan);
            byId('save-plan-btn').addEventListener('click', savePlan);

            byId('left-panel').addEventListener('change', handleLeftPanelChange);
            byId('left-panel').addEventListener('click', handleLeftPanelClick);
            
            byId('center-panel').addEventListener('focus', handleCenterPanelFocus, true); // Use capture phase for focus
            byId('center-panel').addEventListener('input', handleCenterPanelInput);
            byId('center-panel').addEventListener('change', handleCenterPanelChange);
            byId('center-panel').addEventListener('click', handleCenterPanelClick);

            byId('right-panel').addEventListener('click', handleRightPanelClick);
            byId('right-panel').addEventListener('change', handleRightPanelChange);

            byId('feature-modal').addEventListener('click', handleModalEvents);
            byId('feature-management-modal').addEventListener('click', handleFeatureManagementModalEvents);
            byId('confirm-modal').addEventListener('click', (e) => {
                if (!e.target.closest('.modal-content') || e.target.id === 'confirm-cancel-btn') {
                    closeConfirm();
                }
            });

            byId('footer').addEventListener('click', handleFooterEvents);

            // Exports
            byId('export-summary-csv').addEventListener('click', e => { e.preventDefault(); exportReport('summary','csv'); });
            byId('export-summary-xlsx').addEventListener('click', e => { e.preventDefault(); exportReport('summary','xlsx'); });
            byId('export-detail-csv').addEventListener('click', e => { e.preventDefault(); exportReport('detail','csv'); });
            byId('export-detail-xlsx').addEventListener('click', e => { e.preventDefault(); exportReport('detail','xlsx'); });
        }

        // --- RENDER ---
        function render() {
            byId('fiscal-year').value = state.fiscalYear;
            byId('total-sales-target').value = state.totalSalesTarget.toLocaleString('en-US');
            byId('vendor-filter').value = state.ui.vendorFilter;
            
            renderDenominations();
            renderCenterPanel();
            renderRightPanel();
            renderAuditTrail();
            updateUndoRedoButtons();
        }

        function renderDenominations() {
            const container = byId('left-panel');
            container.innerHTML = '<h3>Denominations</h3>';

            let totalMixPercent = state.denominations.reduce((sum, d) => sum + (d.isActive ? d.mixPercent : 0), 0);
            
            state.denominations.forEach(denom => {
                const gamesInDenom = state.games.filter(g => g.denominationPrice === denom.price);
                const actualSalesInDenom = gamesInDenom.reduce((sum, g) => sum + calculateGameMetrics(g).revenue, 0);
                const actualSalesPercent = state.totalSalesTarget > 0 ? (actualSalesInDenom / state.totalSalesTarget) * 100 : 0;
                const progressPercent = denom.mixPercent > 0 ? Math.min(100, (actualSalesPercent / denom.mixPercent) * 100) : 0;

                const el = document.createElement('div');
                el.className = 'denom-item';
                el.dataset.price = denom.price;
                el.innerHTML = `
                    <input type="checkbox" id="denom-active-${denom.price}" data-prop="isActive" ${denom.isActive ? 'checked' : ''}>
                    <label for="denom-active-${denom.price}">$${denom.price}</label>
                    <input type="number" value="${denom.mixPercent}" min="0" max="100" step="0.1" data-prop="mixPercent">
                    <span>%</span>
                    <div class="denom-details">
                        <div style="display: flex; justify-content: space-between; font-size: 0.8em; color: var(--text-dark);">
                            <span>Actual: ${actualSalesPercent.toFixed(1)}%</span>
                            <span>Target: ${denom.mixPercent}%</span>
                        </div>
                        <div style="background: var(--bg-input); border-radius: 99px; height: 8px; margin-top: 2px;">
                             <div style="height: 100%; background: var(--accent-color); border-radius: 99px; width:${progressPercent}%"></div>
                        </div>
                    </div>`;
                container.appendChild(el);
            });

            const totalDiv = document.createElement('div');
            totalDiv.id = 'denom-total';
            totalDiv.textContent = `Total Mix: ${totalMixPercent.toFixed(1)}%`;
            if (totalMixPercent.toFixed(1) != 100.0) {
                totalDiv.classList.add('total-error');
                totalDiv.textContent += ' (Should be 100%)';
            }
            container.appendChild(totalDiv);

            const addForm = document.createElement('div');
            addForm.className = 'add-denom-form';
            addForm.style.marginTop = '1rem';
            addForm.innerHTML = `
                <h4>Add New Price Point</h4>
                <div style="display: flex; gap: 8px;"><input type="number" id="new-denom-price" placeholder="e.g., 4"><button id="add-denom-btn">Add</button></div>`;
            container.appendChild(addForm);
        }
        
        function renderCenterPanel() {
            const container = byId('center-panel');
            const vendorView = state.ui.vendorFilter;
            const gamesForView = vendorView === 'all' ? state.games : state.games.filter(g => g.vendorId === vendorView);
            
            let totalPlannedSales = gamesForView.reduce((sum, g) => sum + calculateGameMetrics(g).revenue, 0);
            let totalPlannedContractCost = gamesForView.reduce((sum, g) => sum + calculateGameMetrics(g).contractCost, 0);
            const salesGoalPercent = state.totalSalesTarget ? (totalPlannedSales / state.totalSalesTarget * 100).toFixed(2) : 0;

            container.innerHTML = `
                <h2 style="font-size: 1.5rem; margin-bottom: 1rem;">FY${state.fiscalYear} Plan</h2>
                <div style="padding: 0.75rem; margin-bottom: 1rem; text-align: center; background-color: #111827; border-radius: 0.5rem; display: flex; flex-direction: column; gap: 0.5rem;">
                    <div><strong>Total Planned Sales (${vendorView === 'all' ? 'All Vendors' : vendorLabel(vendorView)}):</strong> ${formatCurrency(totalPlannedSales)} of ${formatCurrency(state.totalSalesTarget)} (${salesGoalPercent}%)</div>
                    <div style="font-size: 0.9em; color: var(--text-dark);"><strong>Expected Contract Cost:</strong> ${formatCurrency(totalPlannedContractCost)}</div>
                </div>
            `;
            
            state.denominations.filter(d => d.isActive).forEach(denom => {
                const group = document.createElement('div');
                group.className = 'game-group';
                group.dataset.price = denom.price;

                const gamesInGroup = gamesForView.filter(g => g.denominationPrice === denom.price).sort((a,b) => a.name.localeCompare(b.name));
                
                const toggleIcon = denom.isCollapsed ? '►' : '▼';
                const tableDisplay = denom.isCollapsed ? 'display:none;' : '';

                group.innerHTML = `
                    <div class="game-group-header" data-action="toggle-collapse">
                        <span class="toggle-icon">${toggleIcon}</span>
                        <h3>$${denom.price} Games</h3>
                        <button style="margin-left: auto;" data-action="add-game">+ Add Game</button>
                    </div>
                    <div style="${tableDisplay}">
                    <table class="game-table">
                        <thead>
                            <tr>
                                <th>Game #</th><th>Game Name</th><th>Vendor</th><th>Cost Model</th>
                                <th>Units</th><th>Payout %</th><th>Features</th>
                                <th>Contract Cost</th><th>Prize Expense</th><th>Total COGS</th><th>Gross Margin</th>
                                <th>PO #</th><th>PO Date</th><th>Receipt Date</th><th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${gamesInGroup.map(game => renderGameRow(game)).join('')}
                        </tbody>
                    </table>
                    </div>`;
                container.appendChild(group);
            });
        }

        function renderGameRow(game) {
            const metrics = calculateGameMetrics(game);
            const presets = CONTRACT_UNIT_PRESETS[game.denominationPrice] || CONTRACT_UNIT_PRESETS.default;
            const presetOptions = presets.map(n => `<option value="${n}">${n.toLocaleString('en-US')}</option>`).join('');
            const model = state.vendorPricing[game.vendorId]?.costModel || 'percentOfSales';
            const modelLabel = model === 'percentOfSales' ? '% of Sales' : 'Per Thousand';

            return `
                <tr data-game-id="${game.id}">
                    <td><input type="text" value="${game.gameNumber||''}" data-prop="gameNumber" maxlength="4" size="4"></td>
                    <td><input type="text" value="${game.name}" data-prop="name"></td>
                    <td>
                        <select data-prop="vendorId">
                            <option value="sg" ${game.vendorId==='sg'?'selected':''}>Scientific Games</option>
                            <option value="pb" ${game.vendorId==='pb'?'selected':''}>Pollard Banknote</option>
                            <option value="bs" ${game.vendorId==='bs'?'selected':''}>Brightstar</option>
                        </select>
                    </td>
                    <td>${modelLabel}</td>
                    <td>
                        <div style="display: flex; align-items: center; gap: 4px;">
                            <select class="units-preset" data-action="unitsPreset">
                                <option value="">Presets…</option>
                                ${presetOptions}
                                <option value="custom">Custom…</option>
                            </select>
                            <input type="text" class="units-input" value="${game.units.toLocaleString('en-US')}" inputmode="numeric" data-prop="units">
                        </div>
                    </td>
                    <td><input type="number" value="${game.payoutPercent}" step="0.1" data-prop="payoutPercent"></td>
                    <td>${(game.featureIds&&game.featureIds.length)?game.featureIds.join(', '):'None'} <button style="font-size: 0.75rem;" data-action="edit-features">Edit</button></td>
                    <td data-metric="contractCost">${formatCurrency(metrics.contractCost)}</td>
                    <td data-metric="prizeExpense">${formatCurrency(metrics.prizeExpense)}</td>
                    <td data-metric="cogs">${formatCurrency(metrics.cogs)}</td>
                    <td data-metric="grossMargin" style="color:${metrics.grossMargin<0?'var(--danger-color)':'#22c55e'}">${formatCurrency(metrics.grossMargin)}</td>
                    <td><input type="text" value="${game.poNumber||''}" placeholder="PO #" data-prop="poNumber"></td>
                    <td><input type="date" value="${game.poDate||''}" data-prop="poDate"></td>
                    <td><input type="date" value="${game.receiptDate||''}" data-prop="receiptDate"></td>
                    <td>
                        <select data-prop="deliveryStatus">
                            ${['Planned','Ordered','Delivered','Cancelled'].map(s=>`<option value="${s}" ${game.deliveryStatus===s?'selected':''}>${s}</option>`).join('')}
                        </select>
                    </td>
                    <td><button data-action="delete-game">🗑️</button></td>
                </tr>`;
        }
        
        function renderRightPanel() {
            const container = byId('right-panel');
            const vendors = [ { id:'sg', name:'Scientific Games' }, { id:'pb', name:'Pollard Banknote' }, { id:'bs', name:'Brightstar' } ];
            const header = `<div style="display: flex; align-items: center; justify-content: space-between;"><h3>Vendor Pricing</h3><button id="manage-features-btn">Manage Features</button></div>`;
            const tabs = `<div style="display: flex; border-bottom: 1px solid var(--border-color);">${vendors.map(v => `<button class="tab-btn" style="padding: 0.5rem 1rem; margin-bottom: -1px; border: 2px solid transparent; ${state.ui.activeVendorTab===v.id?'border-bottom-color: var(--accent-color); color: var(--accent-color);':''}" data-vendor-id="${v.id}">${v.name}</button>`).join('')}</div>`;

            let content = vendors.map(v => {
                const vd = state.vendorPricing[v.id] || {};
                const costModel = vd.costModel || 'percentOfSales';
                const base = vd.baseCostValue ?? 0;
                const featureRows = state.featureMasterList.map(f => {
                    const name = f['Generic Feature'];
                    const saved = vd.features?.[name] ?? '';
                    return `<tr><td style="padding: 0.25rem 0;">${name}</td><td><input type="number" value="${saved}" placeholder="0.00" step="0.01" data-feature-name="${name}"></td></tr>`;
                }).join('');

                return `
                    <div class="tab-content" style="margin-top: 1rem; ${state.ui.activeVendorTab===v.id?'display:block;':''}" id="tab-${v.id}">
                        <h4>Pricing for ${v.name}</h4>
                        <div style="margin: 0.5rem 0;">
                            <strong>Cost Model:</strong>
                            <label style="margin-left: 1rem;"><input type="radio" name="costModel-${v.id}" value="percentOfSales" ${costModel==='percentOfSales'?'checked':''}> % of Sales</label>
                            <label style="margin-left: 0.5rem;"><input type="radio" name="costModel-${v.id}" value="perThousand" ${costModel==='perThousand'?'checked':''}> Per Thousand</label>
                        </div>
                        <table style="width: 100%; font-size: 0.875rem;">
                            <thead><tr><th style="text-align: left;">Item</th><th style="text-align: left;">Cost</th></tr></thead>
                            <tbody>
                                <tr style="${costModel==='percentOfSales'?'':'display:none;'}"><td style="padding: 0.25rem 0;">Base Cost (% of Sales)</td><td><input type="number" value="${base}" step="0.01" data-feature-name="baseCostValue"></td></tr>
                                <tr style="${costModel==='perThousand'?'':'display:none;'}"><td style="padding: 0.25rem 0;">Base Cost (per Thousand)</td><td><input type="number" value="${base}" step="0.01" data-feature-name="baseCostValue"></td></tr>
                                ${featureRows}
                            </tbody>
                        </table>
                    </div>`;
            }).join('');
            container.innerHTML = header + tabs + content;
        }

        function renderAuditTrail() {
            const container = byId('footer');
            container.innerHTML = `
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem;">
                    <h4>Audit Trail</h4>
                    <button id="clear-log-btn" style="font-size: 0.75rem;">Clear Log</button>
                </div>
                <div id="log-entries" style="font-size: 0.75rem; color: #9ca3af; space-y: 0.25rem;">
                ${state.auditLog.slice(0,5).map(log => `<p>[${log.timestamp}] ${log.message}</p>`).join('')}
                </div>
            `;
        }

        function refreshGameRow(gameId) {
            const game = state.games.find(g => g.id === gameId);
            if (!game) return;
            const row = document.querySelector(`tr[data-game-id="${gameId}"]`);
            if (!row) return;

            const metrics = calculateGameMetrics(game);
            row.querySelector('[data-metric="contractCost"]').textContent = formatCurrency(metrics.contractCost);
            row.querySelector('[data-metric="prizeExpense"]').textContent = formatCurrency(metrics.prizeExpense);
            row.querySelector('[data-metric="cogs"]').textContent = formatCurrency(metrics.cogs);
            const grossMarginCell = row.querySelector('[data-metric="grossMargin"]');
            grossMarginCell.textContent = formatCurrency(metrics.grossMargin);
            grossMarginCell.style.color = metrics.grossMargin < 0 ? 'var(--danger-color)' : '#22c55e';
        }

        // --- HANDLERS ---
        function handleGlobalChange(e) {
            const { id, value } = e.target;
            let msg = '';
            const mutation = s => {
                if (id === 'fiscal-year') {
                    const newYear = parseInt(value, 10);
                    if (newYear && String(newYear).length === 4) {
                        s.fiscalYear = newYear;
                        msg = `Fiscal Year changed to ${newYear}.`;
                    }
                } else if (id === 'total-sales-target') {
                    const newTarget = parseFloat(value.replace(/,/g, '')) || 0;
                    s.totalSalesTarget = newTarget;
                    msg = `Total Sales Target changed to ${formatCurrency(newTarget)}.`;
                } else if (id === 'vendor-filter') {
                    s.ui.vendorFilter = value;
                    msg = `Vendor view changed to '${value}'.`;
                }
            };
            commit(mutation, msg);
        }

        function handleLeftPanelChange(e) {
            const denomDiv = e.target.closest('.denom-item');
            if (!denomDiv) return;
            const price = parseInt(denomDiv.dataset.price, 10);
            const prop = e.target.dataset.prop;
            const value = e.target.type === 'checkbox' ? e.target.checked : parseFloat(e.target.value) || 0;
            
            commit(s => {
                const denom = s.denominations.find(d => d.price === price);
                if (denom && prop) denom[prop] = value;
            }, `Updated $${price} denomination.`);
        }

        function handleLeftPanelClick(e) {
            if (e.target.id === 'add-denom-btn') {
                const input = byId('new-denom-price');
                const price = parseFloat(input.value);
                if (!price || price <= 0) return showError("Please enter a valid price.");
                if (state.denominations.some(d => d.price === price)) return showError(`$${price} already exists.`);
                
                commit(s => {
                    s.denominations.push({ price, mixPercent:0, isActive:true, isCollapsed:false });
                    s.denominations.sort((a,b)=>a.price-b.price);
                }, `Added price point $${price}.`);
                input.value = '';
            }
        }
        
        function handleCenterPanelFocus(e) {
            const target = e.target;
            // Unformat numbers with commas when focusing the input
            if (target.dataset.prop === 'units') {
                target.value = target.value.replace(/,/g, '');
            }
        }

        function handleCenterPanelInput(e) {
            const row = e.target.closest('tr[data-game-id]');
            if (!row) return;
            const gameId = row.dataset.gameId;
            const prop = e.target.dataset.prop;
            if (!gameId || !prop) return;

            const game = state.games.find(g => g.id === gameId);
            if (!game) return;

            let value;
            if (prop === 'units') {
                value = parseFloat(e.target.value.replace(/,/g, '')) || 0;
            } else {
                value = e.target.type === 'number' ? parseFloat(e.target.value) : e.target.value;
            }
            
            game[prop] = value;

            if (['units', 'payoutPercent', 'vendorId'].includes(prop)) {
                refreshGameRow(gameId);
            }
        }

        function handleCenterPanelChange(e) {
            const row = e.target.closest('tr[data-game-id]');
            if (!row) return;
            const gameId = row.dataset.gameId;
            const prop = e.target.dataset.prop;
            if (!gameId || !prop) return;
            
            let value;
            if (prop === 'units') {
                value = parseFloat(e.target.value.replace(/,/g, '')) || 0;
                // Re-format the blurred input immediately for better UX
                e.target.value = value.toLocaleString('en-US'); 
            } else {
                value = e.target.type === 'number' ? parseFloat(e.target.value) || 0 : e.target.value;
            }
            
            commit(s => {
                const game = s.games.find(g => g.id === gameId);
                if(game) game[prop] = value;
            }, `Updated game ${gameId} property ${prop}.`);
        }

        function handleCenterPanelClick(e) {
            const target = e.target;
            const action = target.dataset.action || target.closest('[data-action]')?.dataset.action;
            if (!action) return;

            const gameId = target.closest('tr[data-game-id]')?.dataset.gameId;
            const price = parseInt(target.closest('.game-group')?.dataset.price, 10);

            if (action === 'add-game') {
                const currentVendor = state.ui.vendorFilter;
                commit(s => {
                    const defaultVendor = (currentVendor && currentVendor !== 'all') ? currentVendor : 'sg';
                    const defaultUnits = (CONTRACT_UNIT_PRESETS[price] || CONTRACT_UNIT_PRESETS.default)[0];
                    s.games.push({
                        id:`g${Date.now()}`, gameNumber:'', denominationPrice: price, name:'New Game',
                        vendorId: defaultVendor, 
                        units:defaultUnits, payoutPercent:68.0, featureIds:[],
                        poNumber:'', poDate:'', receiptDate:'', deliveryStatus:'Planned'
                    });
                }, `Added new game to $${price}.`);
            } else if (action === 'delete-game' && gameId) {
                const game = state.games.find(g => g.id === gameId);
                if (game) {
                    showConfirm(`Delete "${game.name}"?`, () => {
                        commit(s => {
                            const idx = s.games.findIndex(g => g.id === gameId);
                            if (idx > -1) s.games.splice(idx, 1);
                        }, `Deleted game '${game.name}'.`);
                    });
                }
            } else if (action === 'edit-features' && gameId) {
                openFeatureModal(gameId);
            } else if (action === 'toggle-collapse') {
                 commit(s => {
                    const denom = s.denominations.find(d => d.price === price);
                    if (denom) denom.isCollapsed = !denom.isCollapsed;
                 }, `Toggled $${price} group.`);
            }
        }
        
        function handleRightPanelClick(e) {
            const target = e.target.closest('[data-vendor-id], #manage-features-btn');
            if (!target) return;

            if (target.id === 'manage-features-btn') {
                openFeatureManagementModal();
            } else if (target.dataset.vendorId) {
                const vendorId = target.dataset.vendorId;
                if (vendorId !== state.ui.activeVendorTab) {
                    commit(s => {
                        s.ui.activeVendorTab = vendorId;
                    }, `Switched to ${vendorLabel(vendorId)} pricing view.`);
                }
            }
        }

        function handleRightPanelChange(e) {
            const vendorId = state.ui.activeVendorTab;
            const vendorData = state.vendorPricing[vendorId];
            if (!vendorData) return;

            if (e.target.name === `costModel-${vendorId}`) {
                const newModel = e.target.value;
                commit(s => {
                    s.vendorPricing[vendorId].costModel = newModel;
                }, `Updated ${vendorId} cost model to ${newModel}.`);
            } else {
                const { featureName } = e.target.dataset || {};
                const cost = parseFloat(e.target.value) || 0;
                if (featureName) {
                    commit(s => {
                        if (featureName === 'baseCostValue') {
                            s.vendorPricing[vendorId].baseCostValue = cost;
                        } else {
                            s.vendorPricing[vendorId].features[featureName] = cost;
                        }
                    }, `Updated ${vendorId} price for '${featureName}' to ${cost}.`);
                }
            }
        }

        // --- MUTATIONS & STATE ---
        function setState(newState) { state = newState; }
        
        function commit(mutationFn, auditMsg) {
            // Create a deep copy of the state *before* the change for the undo history.
            const prevStateForHistory = JSON.parse(JSON.stringify(state));
            
            // Apply the change to the current state.
            mutationFn(state);

            // Now that the state is updated, manage the history.
            history = history.slice(0, historyIndex + 1);
            history.push(prevStateForHistory);
            historyIndex++;

            if (auditMsg) logAudit(auditMsg);
            
            render();
            debouncedAutosave();
        }
        
        // --- MODALS (NO alert/confirm) ---
        let confirmCallback = null;
        function showConfirm(message, onConfirm) {
            byId('confirm-message').textContent = message;
            byId('confirm-modal').style.display = 'flex';
            confirmCallback = onConfirm;
        }
        function closeConfirm() {
            byId('confirm-modal').style.display = 'none';
            confirmCallback = null;
        }
        byId('confirm-ok-btn').addEventListener('click', () => {
            if (confirmCallback) confirmCallback();
            closeConfirm();
        });
        
        function showError(message) {
            alert(message);
        }

        // --- HISTORY ---
        let autosaveTimeout;
        const debouncedAutosave = () => { clearTimeout(autosaveTimeout); autosaveTimeout = setTimeout(saveStateToDB, 1200); };
        
        function recordHistory(isInitial = false) {
            if (isInitial) {
                history = [JSON.parse(JSON.stringify(state))];
                historyIndex = 0;
            }
            updateUndoRedoButtons();
        }
        function updateUndoRedoButtons() {
            byId('undo-btn').disabled = historyIndex <= 0;
            byId('redo-btn').disabled = historyIndex >= history.length - 1;
        }
        function undo() {
            if (historyIndex > 0) {
                historyIndex--;
                setState(JSON.parse(JSON.stringify(history[historyIndex])));
                render();
                saveStateToDB();
                logAudit('Action: Undo.');
            }
        }
        function redo() {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                setState(JSON.parse(JSON.stringify(history[historyIndex])));
                render();
                saveStateToDB();
                logAudit('Action: Redo.');
            }
        }

        // --- DB & AUTOSAVE ---
        function restoreFromAutosaveSafe() {
            return new Promise((resolve) => {
                if (!db) return resolve(false);
                const req = db.transaction(STORE_NAME, 'readonly').objectStore(STORE_NAME).get('autosavedPlan');
                req.onsuccess = (e) => {
                    const saved = e.target.result;
                    if (saved) {
                        showConfirm('An autosaved plan was found. Restore it?', () => {
                            setState(saved);
                            logAudit('Plan restored from autosave.');
                            resolve(true);
                        });
                    } else {
                        resolve(false);
                    }
                };
                req.onerror = () => resolve(false);
            });
        }
        function openDBSafe() {
            return new Promise((resolve) => {
                if (!('indexedDB' in window)) return resolve();
                const req = indexedDB.open(DB_NAME, 1);
                req.onerror = () => resolve();
                req.onsuccess = (e) => { db = e.target.result; resolve(); };
                req.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE_NAME);
            });
        }
        function saveStateToDB() {
            if (!db) return;
            const shallow = JSON.parse(JSON.stringify(state));
            shallow.auditLog = [];
            db.transaction(STORE_NAME, 'readwrite').objectStore(STORE_NAME).put(shallow, 'autosavedPlan');
        }

        // --- EXPORTS ---
        function exportReport(kind, format) {
            if (!window.XLSX) {
                return showError('Export library not loaded. Please check your connection and try again.');
            }
            if (kind === 'summary') {
                const rows = [['Denomination','$ Mix %','Revenue Target','Games','Contract Cost','Prize Expense','Total COGS','Gross Margin']];
                state.denominations.filter(d=>d.isActive).forEach(d=>{
                    const games = state.games.filter(g=>g.denominationPrice===d.price);
                    const revenueTarget = state.totalSalesTarget * (d.mixPercent/100);
                    let contract=0, prize=0, cogs=0, margin=0;
                    games.forEach(g=>{
                        const m = calculateGameMetrics(g);
                        contract += m.contractCost; prize += m.prizeExpense; cogs += m.cogs; margin += m.grossMargin;
                    });
                    rows.push([`$${d.price}`, d.mixPercent, revenueTarget, games.length, contract, prize, cogs, margin]);
                });
                return downloadRows(rows, `FY${state.fiscalYear}_Executive_Summary`, format);
            }
            
            const rows = [['Game #','Game Name','$','Vendor','Units','Payout %','Features','Cost Model','Base Cost','Contract Cost','Prize Expense','COGS','Gross Margin','PO #','PO Date','Receipt Date','Status']];
            state.games.forEach(g=>{
                const m = calculateGameMetrics(g);
                const v = state.vendorPricing[g.vendorId]||{};
                const model = v.costModel||'percentOfSales';
                const features = (g.featureIds||[]).join('; ');
                rows.push([
                    g.gameNumber||'', g.name, g.denominationPrice, (g.vendorId||'').toUpperCase(),
                    g.units, g.payoutPercent, features, model, v.baseCostValue||0,
                    m.contractCost, m.prizeExpense, m.cogs, m.grossMargin,
                    g.poNumber||'', g.poDate||'', g.receiptDate||'', g.deliveryStatus||''
                ]);
            });
            downloadRows(rows, `FY${state.fiscalYear}_Detailed_Build`, format);
        }

        function downloadRows(rows, baseName, format) {
            const ws = XLSX.utils.aoa_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Report');
            if (format === 'xlsx') {
                XLSX.writeFile(wb, `${baseName}.xlsx`);
            } else {
                const csv = XLSX.utils.sheet_to_csv(ws);
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${baseName}.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }
        }

        // --- HELPERS ---
        function byId(id){ return document.getElementById(id); }
        function logAudit(msg){ const ts = new Date().toLocaleTimeString('en-US'); state.auditLog.unshift({timestamp:ts, message:msg}); if (state.auditLog.length>50) state.auditLog.pop(); renderAuditTrail(); }
        function initializeVendorPricing(){ ['sg','pb','bs'].forEach(v => { state.vendorPricing[v] ||= { }; state.vendorPricing[v].features ||= { }; state.vendorPricing[v].costModel ||= 'percentOfSales'; }); }
        function formatCurrency(v){ return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:0,maximumFractionDigits:0}).format(v || 0); }
        function vendorLabel(id){ return id==='sg'?'Scientific Games':id==='pb'?'Pollard Banknote':id==='bs'?'Brightstar':id; }
        
        function handleModalEvents(e) {
            if(e.target.id === 'modal-cancel-btn' || !e.target.closest('.modal-content')) {
                byId('feature-modal').style.display = 'none';
            }
        }
        function handleFeatureManagementModalEvents(e) {
             if(e.target.id === 'modal-done-btn' || !e.target.closest('.modal-content')) {
                byId('feature-management-modal').style.display = 'none';
            }
        }
        function handleFooterEvents(e) {
            if (e.target.id === 'clear-log-btn') {
                commit(s => s.auditLog = [], 'Audit log cleared.');
            }
        }
        function openFeatureModal(gameId) {
            const game = state.games.find(g => g.id === gameId);
            if (!game) return;
            byId('modal-game-name').textContent = game.name;
            byId('feature-checklist').innerHTML = state.featureMasterList.map(f => {
                const name = f['Generic Feature'];
                const checked = game.featureIds?.includes(name) ? 'checked' : '';
                return `<label><input type="checkbox" name="${name}" ${checked}> ${name}</label>`;
            }).join('');
            byId('feature-modal').style.display = 'flex';
        }
        function loadFeatures() { state.featureMasterList = parseCSV(FEATURES_CSV_DATA); }
        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const headers = lines.shift().split(',').map(h => h.trim().replace(/"/g,''));
            return lines.map(line => {
                const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return headers.reduce((o,h,i) => { o[h] = values[i] ? values[i].trim().replace(/"/g,'') : ''; return o; }, {});
            });
        }
        function savePlan() {
            const json = JSON.stringify(state, null, 2);
            const blob = new Blob([json], { type:'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `FY${state.fiscalYear}_Plan.json`; a.click();
            URL.revokeObjectURL(url);
        }
        function loadPlan(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = evt => {
                try {
                    const loaded = JSON.parse(evt.target.result);
                    if (!loaded.hasOwnProperty('fiscalYear')) throw new Error('Invalid plan file.');
                    setState(loaded);
                    logAudit('Plan loaded from file.');
                    history = []; historyIndex = -1; recordHistory(true); render();
                } catch { showError('Error: Could not load the selected file.'); }
            };
            reader.readAsText(file);
        }
        
        function calculateGameMetrics(game) {
            const denom = state.denominations.find(d => d.price === game.denominationPrice);
            if (!denom) return { revenue:0, contractCost:0, prizeExpense:0, cogs:0, grossMargin:0 };
            const revenue = game.units * denom.price;
            const vendor = state.vendorPricing[game.vendorId];
            if (!vendor) return { revenue:0, contractCost:0, prizeExpense:0, cogs:0, grossMargin:0 };

            let manufacturing = 0;
            if (vendor.costModel === 'perThousand') manufacturing = (game.units / 1000) * (vendor.baseCostValue || 0);
            else manufacturing = revenue * ((vendor.baseCostValue || 0) / 100);

            let featureCost = (game.featureIds || []).reduce((sum, name) => {
                return sum + (game.units / 1000) * (vendor.features[name] || 0);
            }, 0);

            const contractCost = manufacturing + featureCost;
            const prizeExpense = revenue * (game.payoutPercent / 100);
            const cogs = contractCost + prizeExpense;
            const grossMargin = revenue - cogs;

            return { revenue, contractCost, prizeExpense, cogs, grossMargin };
        }

    })();
    </script>
</body>
