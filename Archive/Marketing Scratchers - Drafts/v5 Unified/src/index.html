<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Marketing Contract Manager</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <style>
        :root {
            --bg-main: #111827;
            --bg-panel: #1f2937;
            --bg-input: #374151;
            --border-color: #4b5563;
            --text-light: #d1d5db;
            --text-dark: #9ca3af;
            --accent-color: #3b82f6;
            --danger-color: #ef4444;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-light);
        }

        #app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 12px;
            gap: 12px;
            box-sizing: border-box;
        }

        #top-bar {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            background-color: #1f2937;
            /* bg-panel */
            border-radius: 0.5rem;
        }

        .header-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        #main-content {
            flex-grow: 1;
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            gap: 12px;
            overflow: hidden;
        }

        #footer {
            flex-shrink: 0;
            background-color: var(--bg-panel);
            border-radius: 8px;
            padding: 12px;
            overflow-y: auto;
            max-height: 150px;
        }

        .panel {
            background-color: var(--bg-panel);
            border-radius: 8px;
            padding: 16px;
            overflow-y: auto;
        }

        #left-panel,
        #right-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        h2,
        h3,
        h4 {
            font-weight: 600;
        }

        h3 {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            margin-bottom: 8px;
        }

        button,
        select {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px 10px;
            cursor: pointer;
            transition: background-color 0.2s;
            color: var(--text-light);
        }

        button:hover:not(:disabled) {
            background-color: #4b5563;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"] {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px 10px;
            width: auto;
            color: var(--text-light);
        }

        .denom-item {
            display: grid;
            grid-template-columns: auto auto 1fr auto;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .denom-details {
            grid-column: 1 / -1;
            margin-top: 4px;
        }

        #denom-total.total-error {
            color: var(--danger-color);
            font-weight: bold;
        }

        .game-group {
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        .game-group-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background-color: #2b3649;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
        }

        .game-table {
            width: 100%;
            border-collapse: collapse;
        }

        .game-table th,
        .game-table td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9em;
        }

        .game-table th {
            font-weight: 600;
            color: var(--text-dark);
        }

        .game-table input,
        .game-table select {
            max-width: 150px;
            width: 100%;
            box-sizing: border-box;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: var(--bg-panel);
            padding: 24px;
            border-radius: 8px;
            min-width: 400px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .tab-btn.active {
            background-color: var(--accent-color);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: #374151;
            min-width: 220px;
            box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.2);
            z-index: 1;
            border-radius: 6px;
        }

        .dropdown-content a {
            color: var(--text-light);
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }

        .dropdown-content a:hover {
            background-color: #4b5563;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        #scenario-bar {
            display: flex;
            align-items: center;
            background-color: var(--bg-panel);
            padding: 0 1rem;
            border-radius: 0.5rem;
            gap: 1rem;
            overflow-x: auto;
        }

        .scenario-tab {
            padding: 0.75rem 1rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            color: var(--text-dark);
            white-space: nowrap;
        }

        .scenario-tab:hover {
            color: var(--text-light);
        }

        .scenario-tab.active {
            color: var(--accent-color);
            border-bottom-color: var(--accent-color);
            font-weight: 600;
        }

        .scenario-actions {
            margin-left: auto;
            display: flex;
            gap: 0.5rem;
            padding: 0.5rem 0;
        }
    </style>
</head>

<body>
    <div id="app-container">
        <header id="top-bar" role="banner" aria-label="Fiscal Year Controls">
            <div class="header-title">Marketing Contract Manager</div>
            <div class="header-controls" role="group" aria-label="Primary Controls">
                <button id="undo-btn" aria-label="Undo last action" disabled>Undo</button>
                <button id="redo-btn" aria-label="Redo last action" disabled>Redo</button>
                <div class="control-group">
                    <label for="fiscal-year">Fiscal Year:</label>
                    <input type="number" id="fiscal-year" size="4" inputmode="numeric" />
                </div>
                <div class="control-group">
                    <label for="total-sales-target">Total Sales Target: $</label>
                    <input type="text" id="total-sales-target" placeholder="e.g., 4,800,000,000" inputmode="numeric" />
                </div>
                <div class="control-group">
                    <label for="retailer-comm">Retailer Comm %:</label>
                    <input type="number" id="retailer-comm" step="0.1" min="0" max="100" style="width: 60px;" />
                </div>
                <div class="control-group">
                    <label for="admin-expense">Admin Expense %:</label>
                    <input type="number" id="admin-expense" step="0.1" min="0" max="100" style="width: 60px;" />
                </div>
                <div class="control-group">
                    <label for="sell-through">Sell-through %:</label>
                    <input type="number" id="sell-through" step="0.1" min="0" max="100" style="width: 60px;" />
                </div>
                <div class="control-group">
                    <label for="vendor-filter">View:</label>
                    <select id="vendor-filter" aria-label="Filter plan by vendor">
                        <option value="all">All Vendors</option>
                        <option value="sg">Scientific Games</option>
                        <option value="pb">Pollard Banknote</option>
                        <option value="bs">Brightstar</option>
                    </select>
                </div>
                <input type="file" id="load-plan-input" style="display:none" accept=".json" />
                <button id="load-plan-btn">Load Plan</button>
                <button id="save-plan-btn">Save Plan</button>
                <div class="dropdown" role="navigation" aria-label="Export">
                    <button class="dropdown-btn" aria-haspopup="true" aria-expanded="false">Export</button>
                    <div class="dropdown-content" role="menu" aria-label="Export options">
                        <a href="#" id="export-summary-csv" role="menuitem">Executive Summary (CSV)</a>
                        <a href="#" id="export-summary-xlsx" role="menuitem">Executive Summary (XLSX)</a>
                        <a href="#" id="export-detail-csv" role="menuitem">Detailed Build (CSV)</a>
                        <a href="#" id="export-detail-xlsx" role="menuitem">Detailed Build (XLSX)</a>
                    </div>
                </div>
            </div>
        </header>

        <div id="scenario-bar" role="navigation" aria-label="Scenarios">
            <!-- Scenario tabs injected here by ui-render.js -->
        </div>

        <main id="main-content" role="main">
            <aside id="left-panel" class="panel" aria-label="Denominations"></aside>
            <section id="center-panel" class="panel" aria-label="Fiscal Year Plan"></section>
            <aside id="right-panel" class="panel" aria-label="Vendor Pricing"></aside>
        </main>

        <footer id="footer" class="panel" aria-live="polite" aria-label="Audit Trail"></footer>
    </div>

    <!-- Modals -->
    <div id="feature-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-game-name">
        <div class="modal-content">
            <h3>Edit Features for <span id="modal-game-name"></span></h3>
            <div id="feature-checklist" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0;"></div>
            <div class="modal-actions">
                <button id="modal-save-btn">Save</button>
                <button id="modal-cancel-btn">Cancel</button>
            </div>
        </div>
    </div>

    <div id="feature-management-modal" class="modal-overlay" role="dialog" aria-modal="true"
        aria-label="Manage Special Features">
        <div class="modal-content">
            <h3>Manage Special Features</h3>
            <div id="feature-management-list" style="max-height:300px;overflow:auto;margin:12px 0;"></div>
            <div class="add-feature-form">
                <h4>Add New Feature</h4>
                <div style="display:flex;gap:8px;align-items:center;">
                    <input type="text" id="new-feature-name" placeholder="New feature name" />
                    <button id="add-feature-btn">Add</button>
                </div>
            </div>
            <div class="modal-actions">
                <button id="modal-done-btn">Done</button>
            </div>
        </div>
    </div>

    <div id="confirm-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="confirm-title">Confirmation</h3>
            <p id="confirm-message" class="my-4"></p>
            <div class="modal-actions">
                <button id="confirm-cancel-btn">Cancel</button>
                <button id="confirm-ok-btn" style="background-color: var(--danger-color);">OK</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
